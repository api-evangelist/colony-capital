description: >-
  Colony Capital was a diversified real estate and hospitality investment firm
  founded by Tom Barrack in 1991. In June 2021 the company rebranded as
  DigitalBridge Group, Inc. (NYSE: DBRG) — completing a multi-year pivot from
  traditional real estate to pure-play digital infrastructure investing. The
  Boca Raton, FL-based alternative asset manager now operates exclusively across
  five digital infrastructure categories: data centers, macro cell towers,
  fiber networks, small cells, and edge infrastructure. DigitalBridge manages
  approximately $119B in assets across 45+ portfolio companies including
  Vantage Data Centers, DataBank, Switch, Vertical Bridge, Zayo Group, GD
  Towers, Boingo Wireless, AtlasEdge, Scala Data Centers, Yondr Group, and
  ExteNet Systems. In December 2025 SoftBank Group announced a definitive
  agreement to acquire DigitalBridge for approximately $4 billion, with the
  deal expected to close in the second half of 2026. DigitalBridge itself
  publishes no developer API, SDK, or public OpenAPI surface — it is a holding
  company whose programmable surface lives inside its individual portfolio
  companies (e.g., Zayo, DataBank, Switch), each of which is profiled
  separately in the API Evangelist network.
