  - type: Features
    data:
      - name: Data Centers
        description: >-
          Wholesale, hyperscale, colocation, and edge data center platforms
          across North America, EMEA, APAC, and LATAM. Includes Vantage Data
          Centers (NA/EMEA/APAC/SDC), DataBank, Switch, Scala Data Centers,
          AtlasEdge, Aptum Technologies, AIMS, and Yondr Group.
      - name: Macro Cell Towers
        description: >-
          Large-scale tower portfolios across the US, Europe, LATAM, and APAC.
          Includes Vertical Bridge (largest private US tower owner), GD Towers
          (40,000+ sites in Germany/Austria), Digita Oy (Finland/Iceland),
          Highline do Brasil, Mexico Telecom Partners, Andean Telecom Partners,
          and JTOWER (Japan).
      - name: Fiber Networks
        description: >-
          Long-haul, metro, and fiber-to-home networks. Includes Zayo Group
          Holdings (125,000+ route miles globally), Beanfield Metroconnect
          (Toronto/Montreal), Netomnia (UK), WOW! (US Midwest/Southeast),
          Fibernow (Florida), Mundo Pacifico (Chile), and Xenith IG (APAC).
      - name: Small Cells & In-Building Wireless
        description: >-
          Distributed antenna systems, neutral-host small cells, and venue
          Wi-Fi. Includes Boingo Wireless, ExteNet Systems, FreshWave Group
          (UK), and EdgePoint Infrastructure (Southeast Asia).
      - name: Edge Infrastructure
        description: >-
          Edge compute and distributed colocation facilities supporting low-
          latency workloads and AI inference at the edge. Anchored by DataBank
          and AtlasEdge.
      - name: Digital Infrastructure Ground Leases
        description: >-
          Long-term ground lease portfolio supporting wireless and digital
          infrastructure assets, via Landmark Dividend.
      - name: Out-of-Home Digital Media Infrastructure
        description: >-
          Urban digital advertising infrastructure via Orange Barrel Media.
  - type: UseCases
    data:
      - name: AI & Next-Gen Compute Capacity
        description: >-
          DigitalBridge positions its data center and fiber portfolio as core
          infrastructure for AI training and inference workloads, with
          hyperscale operators (Vantage, Scala, Yondr, Switch) providing
          purpose-built capacity for AI tenants.
      - name: 5G Densification & Coverage
        description: >-
          Tower, small cell, and DAS portfolios support carrier 5G rollouts and
          in-building/venue coverage across multiple geographies.
      - name: Hyperscale Cloud Capacity
        description: >-
          Wholesale data center capacity leased to the largest cloud and
          internet platforms via Vantage, Scala, and Yondr.
      - name: Enterprise Connectivity & Managed Services
        description: >-
          Enterprise fiber, dark fiber, IP transit, and managed services via
          Zayo, Aptum, and Beanfield Metroconnect.
      - name: Residential Fiber Broadband
        description: >-
          Fiber-to-home broadband in select US, UK, Chilean, and Brazilian
          markets via WOW!, Netomnia, Mundo Pacifico, and Fibernow.
