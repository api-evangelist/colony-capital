  - type: Predecessor
    data:
      - name: Colony Capital, Inc.
        description: >-
          Diversified real estate and hospitality investment firm founded by
          Tom Barrack in 1991. Historical portfolio included Raffles International
          (2005), Fairmont Hotels and Resorts (2006, $3.24B), Paris Saint-Germain
          football club (2006), and Miramax (2010 from Disney). Merged with
          NorthStar Asset Management and NorthStar Realty Finance in January
          2017 to form Colony NorthStar. Rebranded as DigitalBridge Group in
          June 2021 to reflect its complete pivot to digital infrastructure.
